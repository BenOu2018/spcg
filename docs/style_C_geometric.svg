<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="skyC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a89bb8"/>
      <stop offset="0.5" stop-color="#d8b8c2"/>
      <stop offset="1" stop-color="#f4d6c4"/>
    </linearGradient>
    <linearGradient id="topC" x1="0" y1="0" x2="0.5" y2="0.5">
      <stop offset="0" stop-color="#f8e0d0"/>
      <stop offset="1" stop-color="#e8c5b3"/>
    </linearGradient>
    <linearGradient id="leftC" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#c9a8b8"/>
      <stop offset="1" stop-color="#a886a0"/>
    </linearGradient>
    <linearGradient id="rightC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9c869c"/>
      <stop offset="1" stop-color="#7a6584"/>
    </linearGradient>
    <linearGradient id="topC2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfd4c8"/>
      <stop offset="1" stop-color="#9cbab0"/>
    </linearGradient>
  </defs>

  <!-- 天空 -->
  <rect width="800" height="500" fill="url(#skyC)"/>

  <!-- 星星 -->
  <g fill="#fff" opacity="0.7">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="220" cy="60" r="0.8"/>
    <circle cx="350" cy="90" r="1"/>
    <circle cx="480" cy="50" r="1.3"/>
    <circle cx="600" cy="85" r="0.9"/>
    <circle cx="700" cy="70" r="1.1"/>
    <circle cx="170" cy="130" r="0.8"/>
    <circle cx="420" cy="120" r="0.9"/>
    <circle cx="650" cy="140" r="1"/>
  </g>

  <!-- 远月 -->
  <circle cx="650" cy="120" r="35" fill="#fff" opacity="0.4"/>
  <circle cx="650" cy="120" r="25" fill="#fff" opacity="0.6"/>

  <!-- 大平台（最远） -->
  <g transform="translate(550,250)">
    <polygon points="0,-30 60,0 0,30 -60,0" fill="url(#topC)"/>
    <polygon points="-60,0 0,30 0,80 -60,50" fill="url(#leftC)"/>
    <polygon points="60,0 0,30 0,80 60,50" fill="url(#rightC)"/>
  </g>

  <!-- 中平台（带阶梯） -->
  <g transform="translate(380,300)">
    <polygon points="0,-40 80,0 0,40 -80,0" fill="url(#topC)"/>
    <polygon points="-80,0 0,40 0,100 -80,60" fill="url(#leftC)"/>
    <polygon points="80,0 0,40 0,100 80,60" fill="url(#rightC)"/>
    <!-- 阶梯线 -->
    <line x1="0" y1="-20" x2="40" y2="0" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="0" x2="40" y2="20" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="20" x2="40" y2="40" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- 浮岛 -->
  <g transform="translate(180,200)">
    <polygon points="0,-20 40,0 0,20 -40,0" fill="url(#topC2)"/>
    <polygon points="-40,0 0,20 0,40 -40,20" fill="#7a9c92"/>
    <polygon points="40,0 0,20 0,40 40,20" fill="#5e8378"/>
    <!-- 小树 -->
    <circle cx="-10" cy="-22" r="6" fill="#9cbab0"/>
    <circle cx="0" cy="-26" r="7" fill="#bfd4c8"/>
    <circle cx="10" cy="-22" r="5" fill="#9cbab0"/>
  </g>

  <!-- 浮岛 2 -->
  <g transform="translate(720,300)">
    <polygon points="0,-15 30,0 0,15 -30,0" fill="url(#topC2)"/>
    <polygon points="-30,0 0,15 0,35 -30,20" fill="#7a9c92"/>
    <polygon points="30,0 0,15 0,35 30,20" fill="#5e8378"/>
  </g>

  <!-- 连接路径（虚线） -->
  <g stroke="#fff" stroke-width="1.5" stroke-dasharray="3,4" fill="none" opacity="0.55">
    <path d="M180,210 Q280,260 380,290"/>
    <path d="M380,310 Q470,290 560,260"/>
    <path d="M560,290 Q640,290 720,300"/>
  </g>

  <!-- 主角（几何化小狐狸） -->
  <g transform="translate(380,275)">
    <!-- 身体（菱形） -->
    <polygon points="0,0 10,-6 0,-12 -10,-6" fill="#e8a87c"/>
    <!-- 头 -->
    <polygon points="0,-12 8,-18 0,-24 -8,-18" fill="#e8a87c"/>
    <!-- 耳朵（小三角） -->
    <polygon points="-8,-18 -10,-24 -4,-22" fill="#c8825a"/>
    <polygon points="8,-18 10,-24 4,-22" fill="#c8825a"/>
    <!-- 眼睛 -->
    <circle cx="-2" cy="-19" r="0.8" fill="#3a2840"/>
    <circle cx="2" cy="-19" r="0.8" fill="#3a2840"/>
  </g>

  <!-- 几何花瓣飘落 -->
  <g opacity="0.65">
    <polygon points="100,180 105,177 110,180 105,183" fill="#e8a87c"/>
    <polygon points="280,140 285,137 290,140 285,143" fill="#fff" opacity="0.6"/>
    <polygon points="450,180 455,177 460,180 455,183" fill="#e8a87c"/>
    <polygon points="580,150 585,147 590,150 585,153" fill="#fff" opacity="0.6"/>
    <polygon points="380,80 385,77 390,80 385,83" fill="#e8a87c"/>
  </g>

  <!-- 顶部 UI（几何化） -->
  <g opacity="0.95">
    <polygon points="40,42 65,42 70,55 65,68 40,68 35,55" fill="#fff" opacity="0.18"/>
    <text x="52" y="60" fill="#3a2840" font-size="14" text-anchor="middle" font-weight="500">⌬</text>
    <text x="85" y="55" fill="#fff" font-size="22" font-weight="500" letter-spacing="4">SPCG</text>
    <text x="85" y="75" fill="#fff" font-size="11" letter-spacing="2" opacity="0.8">几何之境 · 第三关</text>
  </g>
  <g transform="translate(700,42)">
    <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#fff" opacity="0.18"/>
    <polygon points="0,-12 11,-6 11,6 0,12 -11,6 -11,-6" fill="#e8a87c"/>
    <text y="4" text-anchor="middle" fill="#fff" font-size="10">卯</text>
  </g>

  <!-- 底部 UI 卡片（几何） -->
  <g transform="translate(0,440)">
    <rect width="800" height="60" fill="#3a2840" opacity="0.45"/>
    <g transform="translate(50,15)" fill="#fff">
      <text font-size="11" opacity="0.7">第 3 关</text>
      <text y="18" font-size="14">两个袋子的秘密</text>
    </g>
    <g transform="translate(580,30)">
      <polygon points="-50,-15 50,-15 56,0 50,15 -50,15 -56,0" fill="#e8a87c"/>
      <text text-anchor="middle" y="5" fill="#fff" font-size="13" font-weight="500">继续旅程 →</text>
    </g>
  </g>
</svg>
