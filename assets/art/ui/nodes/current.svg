<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Current level node</title>
  <desc id="desc">Current SPCG level node with warm glow.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0" stop-color="#fff2a8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f2b552" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="20" y1="10" x2="76" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe08b"/>
      <stop offset="1" stop-color="#df8e3e"/>
