<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 220" role="img" aria-labelledby="title desc">
  <title id="title">Result panel frame</title>
  <desc id="desc">Dark result panel frame for tests and output.</desc>
  <defs>
    <linearGradient id="result" x1="30" y1="0" x2="1050" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102329"/>
      <stop offset="1" stop-color="#09171b"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-20%" width="116%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="14" y="10" width="1052" height="196" rx="14" fill="url(#result)" filter="url(#shadow)"/>
  <rect x="22" y="18" width="1036" height="180" rx="10" fill="none" stroke="#8f7041" stroke-width="2" opacity="0.45"/>
  <rect x="30" y="26" width="150" height="42" rx="10" fill="#1b3035"/>
  <circle cx="52" cy="47" r="6" fill="#79c96f"/>
</svg>
