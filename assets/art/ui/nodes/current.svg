    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#6d461d" flood-opacity="0.24"/>
    </filter>
  </defs>
  <circle cx="48" cy="48" r="45" fill="url(#glow)"/>
  <circle cx="48" cy="48" r="34" fill="url(#gold)" filter="url(#shadow)"/>
  <circle cx="48" cy="48" r="27" fill="none" stroke="#fff7d7" stroke-width="5" opacity="0.85"/>
  <path d="M48 20l7 16 17 2-13 11 4 17-15-9-15 9 4-17-13-11 17-2z" fill="#fffaf0"/>
