  <path d="M76 3l12 16-12 16-12-16zM76 117l12 16-12 16-12-16z" fill="#0c7873" stroke="#e5b85a" stroke-width="3"/>
  <circle cx="76" cy="19" r="4" fill="#62fff5"/>
  <circle cx="76" cy="133" r="4" fill="#62fff5"/>
