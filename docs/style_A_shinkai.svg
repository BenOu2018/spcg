<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="skyA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3e6b"/>
      <stop offset="0.35" stop-color="#7c5d8a"/>
      <stop offset="0.65" stop-color="#e0967e"/>
      <stop offset="1" stop-color="#f4c89a"/>
    </linearGradient>
    <radialGradient id="sunA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff5d6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fff5d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waterA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a6f8c"/>
      <stop offset="1" stop-color="#324358"/>
    </linearGradient>
    <filter id="glowA"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- 天空 -->
  <rect width="800" height="500" fill="url(#skyA)"/>

  <!-- 落日 -->
  <circle cx="610" cy="220" r="55" fill="#fff0c2" opacity="0.95"/>
  <circle cx="610" cy="220" r="120" fill="url(#sunA)"/>

  <!-- 远山 -->
  <path d="M0,330 L80,290 L160,310 L240,260 L340,290 L440,255 L560,285 L680,260 L800,290 L800,360 L0,360 Z" fill="#3a3656" opacity="0.85"/>

  <!-- 中景小镇 -->
  <path d="M0,360 L800,360 L800,395 L0,395 Z" fill="#2b2a40"/>
  <g fill="#1f1e30">
    <rect x="60" y="335" width="35" height="25"/>
    <polygon points="55,335 100,335 78,318"/>
    <rect x="120" y="345" width="25" height="15"/>
    <rect x="180" y="330" width="40" height="30"/>
    <polygon points="175,330 225,330 200,315"/>
    <rect x="250" y="340" width="30" height="20"/>
    <rect x="320" y="335" width="55" height="25"/>
    <polygon points="315,335 380,335 348,315"/>
    <rect x="430" y="345" width="30" height="15"/>
    <rect x="500" y="335" width="40" height="25"/>
    <polygon points="495,335 545,335 520,318"/>
    <rect x="580" y="340" width="35" height="20"/>
    <rect x="650" y="335" width="50" height="25"/>
    <polygon points="645,335 705,335 675,318"/>
    <rect x="730" y="345" width="30" height="15"/>
  </g>
  <!-- 窗户灯光 -->
  <g fill="#ffd685" opacity="0.85">
    <rect x="68" y="345" width="4" height="6"/>
    <rect x="80" y="345" width="4" height="6"/>
    <rect x="190" y="340" width="4" height="6"/>
    <rect x="200" y="340" width="4" height="6"/>
    <rect x="335" y="345" width="4" height="6"/>
    <rect x="350" y="345" width="4" height="6"/>
    <rect x="365" y="345" width="4" height="6"/>
    <rect x="510" y="345" width="4" height="6"/>
    <rect x="525" y="345" width="4" height="6"/>
    <rect x="660" y="345" width="4" height="6"/>
    <rect x="680" y="345" width="4" height="6"/>
  </g>

  <!-- 水面 -->
  <rect y="395" width="800" height="105" fill="url(#waterA)"/>
  <!-- 水面倒影 -->
  <ellipse cx="610" cy="395" rx="55" ry="6" fill="#fff0c2" opacity="0.4"/>
  <g stroke="#a8b5c8" stroke-width="0.6" opacity="0.5" fill="none">
    <path d="M50,410 Q70,408 90,410"/>
    <path d="M150,420 Q170,418 190,420"/>
    <path d="M280,415 Q300,413 320,415"/>
    <path d="M450,425 Q470,423 490,425"/>
    <path d="M580,418 Q600,416 620,418"/>
    <path d="M700,422 Q720,420 740,422"/>
  </g>

  <!-- 飞鸟 -->
  <g stroke="#1a1a2e" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M120,130 q5,-4 10,0 q5,-4 10,0"/>
    <path d="M180,100 q4,-3 8,0 q4,-3 8,0"/>
    <path d="M240,140 q3,-3 6,0 q3,-3 6,0"/>
  </g>

  <!-- 主角小狐狸（背影） -->
  <g transform="translate(150,360)">
    <!-- 身体 -->
    <ellipse cx="0" cy="6" rx="14" ry="10" fill="#d97757"/>
    <!-- 头 -->
    <circle cx="0" cy="-8" r="11" fill="#d97757"/>
    <!-- 耳朵 -->
    <polygon points="-8,-15 -10,-22 -3,-17" fill="#d97757"/>
    <polygon points="8,-15 10,-22 3,-17" fill="#d97757"/>
    <polygon points="-7,-16 -8,-19 -4,-17" fill="#fff" opacity="0.9"/>
    <polygon points="7,-16 8,-19 4,-17" fill="#fff" opacity="0.9"/>
    <!-- 尾巴 -->
    <ellipse cx="13" cy="8" rx="6" ry="3" fill="#d97757" transform="rotate(20 13 8)"/>
    <circle cx="17" cy="9" r="3" fill="#fff" opacity="0.95"/>
  </g>

  <!-- 顶部 UI -->
  <g opacity="0.92">
    <text x="40" y="55" fill="#fff" font-size="26" font-weight="500" letter-spacing="4">SPCG</text>
    <text x="40" y="78" fill="#fff" font-size="11" letter-spacing="2" opacity="0.8">算法之夜 · 雾镇序章</text>
  </g>
  <g transform="translate(700,42)">
    <circle r="18" fill="#fff" opacity="0.18"/>
    <circle r="13" fill="#d97757"/>
    <text y="4" text-anchor="middle" fill="#fff" font-size="11">卯</text>
  </g>

  <!-- 底部 UI 卡片 -->
  <g transform="translate(0,440)">
    <rect width="800" height="60" fill="#1a1a2e" opacity="0.55"/>
    <g transform="translate(50,15)" fill="#fff">
      <text font-size="11" opacity="0.7">第 3 关</text>
      <text y="18" font-size="14">两个袋子的秘密</text>
    </g>
    <g transform="translate(580,30)">
      <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#f4c89a"/>
      <text text-anchor="middle" y="5" fill="#2c3e6b" font-size="13" font-weight="500">继续旅程 →</text>
    </g>
  </g>
</svg>
