<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPCG Military Badge Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(45deg, rgba(255,255,255,.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.08) 25%, transparent 25%),
        #101923;
      background-size: 28px 28px;
      color: #eef6ff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: flex;
      gap: 40px;
      align-items: end;
    }

    figure {
      margin: 0;
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    img {
      width: 160px;
      height: auto;
    }

    figcaption {
      font-size: 14px;
      color: #b9c9dc;
    }
  </style>
</head>
<body>
  <main>
    <figure>
      <img src="./pass-badge.svg" alt="Pass badge" />
      <figcaption>Pass Badge</figcaption>
    </figure>
    <figure>
      <img src="./ak-badge.svg" alt="AK badge" />
      <figcaption>AK Badge</figcaption>
    </figure>
  </main>
</body>
</html>
