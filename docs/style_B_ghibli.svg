<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="skyB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f0e3"/>
      <stop offset="0.6" stop-color="#f4ebd3"/>
      <stop offset="1" stop-color="#f7e7c4"/>
    </linearGradient>
    <linearGradient id="hill1B" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bb888"/>
      <stop offset="1" stop-color="#7a9b6a"/>
    </linearGradient>
    <linearGradient id="hill2B" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a9b6a"/>
      <stop offset="1" stop-color="#5e7d52"/>
    </linearGradient>
    <linearGradient id="hill3B" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5e7d52"/>
      <stop offset="1" stop-color="#475f3f"/>
    </linearGradient>
    <radialGradient id="lanternB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff2c0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fff2c0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="paperB" patternUnits="userSpaceOnUse" width="80" height="80">
      <rect width="80" height="80" fill="none"/>
      <circle cx="20" cy="30" r="0.8" fill="#bbb091" opacity="0.3"/>
      <circle cx="50" cy="60" r="0.6" fill="#bbb091" opacity="0.3"/>
      <circle cx="65" cy="20" r="0.5" fill="#bbb091" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- 天空（米白偏暖） -->
  <rect width="800" height="500" fill="url(#skyB)"/>
  <rect width="800" height="500" fill="url(#paperB)"/>

  <!-- 太阳（大而温柔） -->
  <circle cx="200" cy="160" r="60" fill="#fff5d6" opacity="0.7"/>
  <circle cx="200" cy="160" r="40" fill="#fff" opacity="0.5"/>

  <!-- 云朵（手绘感） -->
  <g fill="#fff" opacity="0.85">
    <ellipse cx="500" cy="120" rx="60" ry="20"/>
    <ellipse cx="540" cy="115" rx="40" ry="18"/>
    <ellipse cx="470" cy="125" rx="35" ry="15"/>
    <ellipse cx="650" cy="170" rx="45" ry="14"/>
    <ellipse cx="690" cy="165" rx="30" ry="12"/>
  </g>

  <!-- 远山（最浅） -->
  <path d="M0,310 Q120,250 240,275 Q360,250 480,290 Q600,260 720,285 Q780,270 800,280 L800,360 L0,360 Z" fill="url(#hill3B)" opacity="0.6"/>

  <!-- 中景山丘 -->
  <path d="M0,340 Q150,275 320,320 Q450,290 600,335 Q720,310 800,325 L800,400 L0,400 Z" fill="url(#hill2B)"/>

  <!-- 近景山丘 -->
  <path d="M0,395 Q200,340 380,380 Q550,355 700,395 Q780,380 800,388 L800,500 L0,500 Z" fill="url(#hill1B)"/>

  <!-- 草地纹理 -->
  <g stroke="#5e7d52" stroke-width="0.8" opacity="0.4">
    <path d="M50,440 v-6"/><path d="M65,445 v-5"/><path d="M82,442 v-7"/>
    <path d="M180,460 v-6"/><path d="M195,463 v-5"/><path d="M212,461 v-7"/>
    <path d="M340,455 v-6"/><path d="M358,458 v-5"/><path d="M375,456 v-7"/>
    <path d="M520,470 v-6"/><path d="M535,473 v-5"/><path d="M552,471 v-7"/>
    <path d="M680,460 v-6"/><path d="M695,463 v-5"/><path d="M712,461 v-7"/>
  </g>

  <!-- 远景小屋 -->
  <g transform="translate(620,310)">
    <rect width="40" height="25" fill="#c89472" opacity="0.9"/>
    <polygon points="-3,0 43,0 20,-15" fill="#a06849"/>
    <rect x="15" y="10" width="8" height="15" fill="#7a4f33"/>
    <rect x="3" y="6" width="6" height="6" fill="#fff5d6"/>
    <rect x="30" y="6" width="6" height="6" fill="#fff5d6"/>
    <!-- 烟囱与轻烟 -->
    <rect x="32" y="-12" width="4" height="8" fill="#7a4f33"/>
    <path d="M34,-15 q-3,-5 0,-10 q3,-5 0,-12" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- 大树 -->
  <g transform="translate(450,380)">
    <rect x="-3" y="0" width="6" height="20" fill="#7a4f33"/>
    <ellipse cx="0" cy="-10" rx="35" ry="28" fill="#7a9b6a"/>
    <ellipse cx="-15" cy="-15" rx="18" ry="15" fill="#9bb888" opacity="0.8"/>
    <ellipse cx="12" cy="-8" rx="20" ry="16" fill="#9bb888" opacity="0.7"/>
  </g>

  <!-- 灯笼光晕 -->
  <circle cx="190" cy="400" r="50" fill="url(#lanternB)"/>

  <!-- 主角小狐狸 + 灯笼 -->
  <g transform="translate(180,420)">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="16" ry="11" fill="#d4956b"/>
    <ellipse cx="0" cy="-2" rx="14" ry="9" fill="#e0a980"/>
    <!-- 头 -->
    <circle cx="0" cy="-12" r="12" fill="#e0a980"/>
    <!-- 耳朵 -->
    <polygon points="-9,-19 -11,-26 -3,-21" fill="#d4956b"/>
    <polygon points="9,-19 11,-26 3,-21" fill="#d4956b"/>
    <polygon points="-8,-20 -9,-23 -5,-21" fill="#fff" opacity="0.85"/>
    <polygon points="8,-20 9,-23 5,-21" fill="#fff" opacity="0.85"/>
    <!-- 眼睛 -->
    <circle cx="-3" cy="-12" r="1.2" fill="#3a2614"/>
    <circle cx="4" cy="-12" r="1.2" fill="#3a2614"/>
    <!-- 鼻子 -->
    <ellipse cx="0.5" cy="-9" rx="1" ry="0.7" fill="#3a2614"/>
    <!-- 尾巴（蓬松） -->
    <ellipse cx="-15" cy="2" rx="8" ry="5" fill="#d4956b" transform="rotate(-15 -15 2)"/>
    <ellipse cx="-19" cy="0" rx="5" ry="4" fill="#fff" opacity="0.95"/>
    <!-- 灯笼线 -->
    <line x1="14" y1="-5" x2="22" y2="-30" stroke="#3a2614" stroke-width="1"/>
    <!-- 灯笼 -->
    <ellipse cx="22" cy="-25" rx="8" ry="10" fill="#fff2c0"/>
    <ellipse cx="22" cy="-25" rx="6" ry="8" fill="#ffe289"/>
    <line x1="22" y1="-35" x2="22" y2="-32" stroke="#3a2614" stroke-width="1"/>
    <line x1="22" y1="-15" x2="22" y2="-13" stroke="#3a2614" stroke-width="1"/>
  </g>

  <!-- 飘落的叶子 -->
  <g fill="#d4956b" opacity="0.7">
    <ellipse cx="380" cy="200" rx="3" ry="1.5" transform="rotate(30 380 200)"/>
    <ellipse cx="420" cy="240" rx="3" ry="1.5" transform="rotate(-20 420 240)"/>
    <ellipse cx="500" cy="220" rx="3" ry="1.5" transform="rotate(45 500 220)"/>
    <ellipse cx="350" cy="280" rx="3" ry="1.5" transform="rotate(-10 350 280)"/>
  </g>

  <!-- 顶部 UI -->
  <g opacity="0.95">
    <text x="40" y="55" fill="#3a2614" font-size="26" font-weight="500" letter-spacing="4">SPCG</text>
    <text x="40" y="78" fill="#7a4f33" font-size="11" letter-spacing="2">算法田园 · 镜湖小径</text>
  </g>
  <g transform="translate(700,42)">
    <circle r="18" fill="#fff" opacity="0.6"/>
    <circle r="13" fill="#d4956b"/>
    <text y="4" text-anchor="middle" fill="#fff" font-size="11">卯</text>
  </g>

  <!-- 底部 UI 卡片 -->
  <g transform="translate(0,440)">
    <rect width="800" height="60" fill="#fff" opacity="0.7"/>
    <g transform="translate(50,15)" fill="#3a2614">
      <text font-size="11" opacity="0.7">第 3 关</text>
      <text y="18" font-size="14">两个袋子的秘密</text>
    </g>
    <g transform="translate(580,30)">
      <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#7a9b6a"/>
      <text text-anchor="middle" y="5" fill="#fff" font-size="13" font-weight="500">继续旅程 →</text>
    </g>
  </g>
</svg>
