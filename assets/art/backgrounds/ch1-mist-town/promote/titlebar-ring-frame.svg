<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 152" role="img" aria-labelledby="title desc">
  <title id="title">Compact titlebar progression ring</title>
  <desc id="desc">Circular compact progression widget frame for the programming titlebar.</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#000" flood-opacity=".34"/>
    </filter>
    <linearGradient id="brass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e8bd64"/>
      <stop offset=".46" stop-color="#9b672c"/>
      <stop offset="1" stop-color="#4d2a12"/>
    </linearGradient>
    <linearGradient id="core" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#123b3d"/>
      <stop offset="1" stop-color="#061b1d"/>
    </linearGradient>
  </defs>
  <circle cx="76" cy="76" r="68" fill="url(#brass)" filter="url(#shadow)"/>
  <circle cx="76" cy="76" r="60" fill="url(#core)" stroke="#1b5758" stroke-width="3"/>
