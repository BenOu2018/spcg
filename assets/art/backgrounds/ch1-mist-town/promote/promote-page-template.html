<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPCG 关卡晋级路线</title>
    <link rel="stylesheet" href="./promote.css" />
  </head>
  <body>
    <main class="promote-demo">
      <section class="promote-shell" aria-label="本关晋级路线">
        <header class="promote-header">
          <h1 class="promote-title">本关晋级路线</h1>
          <div class="progress-pill" aria-label="当前必做进度">
            <span>必做</span>
            <strong>1/3</strong>
          </div>
        </header>

        <div class="promote-body">
          <section class="promote-route" aria-label="题目路线">
            <div class="rail" aria-hidden="true"></div>
            <div class="rail optional" aria-hidden="true"></div>

            <div class="node-grid">
              <article class="problem-node completed">
                <span class="node-index">1</span>
                <span class="node-kind">模板</span>
                <h2 class="node-title">模板题 / 引导题</h2>
                <p class="node-desc">建立本关基本模型和代码模板</p>
                <img class="node-state-icon" src="./icon-check.svg" alt="已完成" />
              </article>

              <article class="problem-node current">
                <span class="node-index">2</span>
                <span class="node-kind">必做</span>
                <h2 class="node-title">基础练习 1</h2>
                <p class="node-desc">巩固核心语法或算法步骤</p>
                <img class="node-state-icon" src="./icon-spark.svg" alt="" />
                <span class="current-ribbon">当前题目</span>
              </article>

              <article class="problem-node required">
                <span class="node-index">3</span>
                <span class="node-kind">必做</span>
                <h2 class="node-title">基础练习 2 / 变式题</h2>
                <p class="node-desc">确认学生能迁移使用</p>
                <img class="node-state-icon" src="./icon-lock.svg" alt="待解锁" />
              </article>

              <article class="problem-node advanced">
                <span class="node-index">4</span>
                <span class="node-kind">提高</span>
                <h2 class="node-title">提高题 1</h2>
                <p class="node-desc">鼓励挑战更复杂条件</p>
                <img class="node-state-icon" src="./icon-star.svg" alt="" />
              </article>

              <article class="problem-node challenge">
                <span class="node-index">5</span>
                <span class="node-kind">挑战</span>
                <h2 class="node-title">提高题 2 / 挑战题</h2>
                <p class="node-desc">形成完全掌握反馈</p>
                <img class="node-state-icon" src="./icon-trophy.svg" alt="" />
              </article>
            </div>

            <div class="route-caption" aria-hidden="true">必做路线</div>
          </section>

          <aside class="promote-side" aria-label="晋级引导">
            <section class="guide-card">
              <img src="./icon-spark.svg" alt="" />
              <h2>完成前三题即可晋级</h2>
              <p>挑战提高题可获得额外称谓，并让系统记录更完整的掌握反馈。</p>
              <div class="required-list">
                <span><img src="./badge-required.svg" alt="" />1-3 题阻塞晋级</span>
                <span><img src="./badge-optional.svg" alt="" />4-5 题不阻塞</span>
              </div>
            </section>

            <nav class="promote-actions" aria-label="题目操作">
              <a class="asset-button current" href="#">继续当前题</a>
              <a class="asset-button advanced" href="#">挑战提高题</a>
              <a class="asset-button next" href="#" aria-disabled="true">完成必做后晋级</a>
            </nav>
          </aside>
        </div>
      </section>
    </main>
  </body>
</html>
