  <desc id="desc">Green run button for the programming page.</desc>
  <defs>
    <linearGradient id="fill" x1="18" y1="8" x2="202" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#96dc68"/>
      <stop offset="1" stop-color="#428d37"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-30%" width="124%" height="170%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1a3e17" flood-opacity="0.3"/>
