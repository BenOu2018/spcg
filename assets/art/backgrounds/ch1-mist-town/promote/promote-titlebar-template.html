<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPCG 标题栏晋级组件</title>
    <link rel="stylesheet" href="./promote-titlebar.css" />
  </head>
  <body>
    <main class="titlebar-demo">
      <section class="programming-mock" aria-label="编程页面标题栏晋级组件演示">
        <header class="programming-titlebar">
          <div class="code-tab">
            <img src="./titlebar-code-icon.svg" alt="" />
            <span>main.cpp</span>
          </div>

          <section class="titlebar-promote" aria-label="本关晋级进度">
            <img class="ring-frame" src="./titlebar-ring-frame.svg" alt="" />
            <button class="mini-node completed" aria-label="第1题已完成">
              <img src="./titlebar-node-completed.svg" alt="" />
              <span>✓</span>
            </button>
            <button class="mini-node step-1" aria-label="第1题模板题">
              <img src="./titlebar-node-required.svg" alt="" />
              <span>1</span>
            </button>
            <button class="mini-node current" aria-label="第2题当前题目">
              <img src="./titlebar-node-current.svg" alt="" />
              <span>2</span>
            </button>
            <button class="mini-node locked" aria-label="第3题待完成">
              <img src="./titlebar-node-locked.svg" alt="" />
              <span>3</span>
            </button>
            <button class="mini-node advanced" aria-label="第4题提高题，不阻塞晋级">
              <img src="./titlebar-node-advanced.svg" alt="" />
              <span>4</span>
            </button>
            <button class="mini-node challenge" aria-label="第5题挑战题，不阻塞晋级">
              <img src="./titlebar-node-challenge.svg" alt="" />
              <span>5</span>
            </button>
            <div class="titlebar-promote-core">
              <strong>必做 <b>1/3</b></strong>
              <span>当前 <b>2</b></span>
            </div>
            <div class="titlebar-tip">前三题晋级 · 提高题不阻塞</div>
          </section>

          <nav class="titlebar-actions" aria-label="标题栏操作">
            <a class="titlebar-advanced-button" href="#">挑战提高</a>
            <a class="titlebar-icon-button" href="#" aria-label="题单">
              <img src="./titlebar-bookmark-icon.svg" alt="" />
            </a>
            <a class="titlebar-icon-button" href="#" aria-label="设置">
              <img src="./titlebar-gear-icon.svg" alt="" />
            </a>
          </nav>
        </header>

        <div class="editor-mock" aria-hidden="true">
          <div class="line-numbers">1<br />2<br />3<br />4<br />5<br />6</div>
          <pre class="code-lines"><span class="purple">#include</span> <span class="green">&lt;bits/stdc++.h&gt;</span>
using namespace std;

<span class="blue">int</span> main() {
    int n;
    cin &gt;&gt; n;
}</pre>
        </div>
      </section>
    </main>
  </body>
</html>
