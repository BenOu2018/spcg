<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 160" role="img" aria-labelledby="title desc">
  <title id="title">SPCG compact wordmark</title>
  <desc id="desc">A compact text-only SPCG logo.</desc>
  <defs>
    <linearGradient id="wordFill" x1="20" y1="36" x2="236" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29365f"/>
      <stop offset="1" stop-color="#151c34"/>
    </linearGradient>
  </defs>

  <text x="128" y="101"
    text-anchor="middle"
    fill="url(#wordFill)"
    font-family="Avenir Next, Nunito Sans, Inter, Arial, sans-serif"
    font-size="50"
    font-weight="850"
    letter-spacing="4">SPCG</text>
</svg>
